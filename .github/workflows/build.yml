name: Build paper

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-publishers

      - name: Compile
        run: make compile

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/main.pdf

      - name: Attach PDF to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: paper/main.pdf

      - name: Stage PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p out
          cp paper/main.pdf out/

      - name: Publish to pdf branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: pdf
          publish_dir: ./out
          keep_files: true
          commit_message: "Publish compiled main.pdf from ${{ github.sha }}"
